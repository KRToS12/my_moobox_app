<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO Meta Tags -->
  <meta name="description" content="MudanzasPro – Empresa de mudanzas profesionales. Mudanza residencial, comercial, embalaje y almacenamiento. Cotización gratis. +500 clientes satisfechos.">
  <meta name="keywords" content="mudanzas, empresa de mudanzas, mudanza residencial, mudanza comercial, embalaje, almacenamiento, cotización gratis">
  <meta name="author" content="MudanzasPro">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="MudanzasPro – Mudanzas Sin Estrés">
  <meta property="og:description" content="Tu hogar o empresa merece el mejor cuidado durante cada mudanza. Cotización 100% gratis.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mudanzaspro.cl">

  <!-- Theme color -->
  <meta name="theme-color" content="#1E235D">

  <!-- Google Fonts preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <title>MudanzasPro – Mudanzas Profesionales Sin Estrés</title>

  <style>
    /* Prevent flash of white before Flutter loads */
    body {
      background-color: #1E235D;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #F8F9FA;
    }
    ::-webkit-scrollbar-thumb {
      background: #1E235D;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #F5897C;
    }

    /* Loading indicator */
    #flutter-loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1E235D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #flutter-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader-logo {
      width: 56px;
      height: 56px;
      background: #F5897C;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #F5897C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="flutter-loading">
    <div class="loader-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
      </svg>
    </div>
    <div class="loader-spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      const loader = document.getElementById('flutter-loading');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 500);
      }
    });
  </script>
</body>
</html>
