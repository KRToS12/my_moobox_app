name: mudanzas_web
description: "Moobox – Plataforma de mudanzas y logística profesional"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  visibility_detector: ^0.4.0+2
  flutter_svg: ^2.0.9
  email_validator: ^3.0.0
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/LOGOsf.png
    - assets/images/gallery_truck.png
    - assets/images/gallery_packing.png
    - assets/images/gallery_furniture.png
    - assets/images/gallery_storage.png
    - assets/images/gallery_team.png
    - assets/images/gallery_delivery.png
